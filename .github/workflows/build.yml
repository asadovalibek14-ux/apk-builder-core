name: Android Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build and Package
        run: |
          mkdir -p output
          # index.html faylingizni arxivlaymiz (hozircha APK uchun shablon sifatida)
          zip -r my-app.zip index.html
          mv my-app.zip output/my-app.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: MyAndroidApp
          path: output/my-app.zip
