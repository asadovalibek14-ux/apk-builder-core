name: Build Android APK
on:
  workflow_dispatch:
  repository_dispatch:
    types: [start-build] # "start-build" - bu bizning maxsus signalimiz

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Payload'dan kelgan ma'lumotlarni o'qish (Agar kerak bo'lsa)
      - name: Echo payload
        run: echo "Ilova nomi: ${{ github.event.client_payload.app_name }}"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GreenLeaf-APK
          path: app/build/outputs/apk/debug/app-debug.apk
