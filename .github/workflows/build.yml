name: Android Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create Package
        run: |
          mkdir -p output
          zip -r my-app-bundle.zip .
          mv my-app-bundle.zip output/

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: MyWebsiteApp
          path: output/my-app-bundle.zip
