name: Build Android APK

on:
  # 1. GitHub interfeysidan qo‘lda ishga tushirish uchun
  workflow_dispatch:
  
  # 2. Sizning backend serveringizdan API orqali ishga tushirish uchun
  repository_dispatch:
    types: [start-build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        # "assembleDebug" o'rniga "assembleRelease" ham ishlatishingiz mumkin
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GreenLeaf-APK
          # Fayl manzili to'g'riligiga ishonch hosil qiling
          path: app/build/outputs/apk/debug/app-debug.apk
